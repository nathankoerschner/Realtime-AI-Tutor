name: CI + Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv package manager
        run: pip install uv

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --extra dev

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=. uv run pytest

      - name: Smoke test backend import
        run: |
          cd backend
          PYTHONPATH=. uv run python -c "from app.main import app; print(app.title)"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          set -euo pipefail

          for attempt in 1 2 3; do
            echo "Railway deploy attempt ${attempt}/3"

            if railway up --service="$RAILWAY_SERVICE_ID" --detach --verbose; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              sleep_seconds=$((attempt * 15))
              echo "Railway deploy failed, retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done

          echo "Railway deploy failed after 3 attempts"
          exit 1
