name: CI + Deploy to Railway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_CLI_VERSION: 4.30.5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:run

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv package manager
        run: pip install uv

      - name: Install backend dependencies
        run: |
          cd backend
          uv sync --extra dev

      - name: Run backend tests
        run: |
          cd backend
          PYTHONPATH=. uv run pytest

      - name: Smoke test backend import
        run: |
          cd backend
          PYTHONPATH=. uv run python -c "from app.main import app; print(app.title)"

      - name: Install Railway CLI
        run: |
          npm install -g "@railway/cli@${RAILWAY_CLI_VERSION}"
          railway --version

      - name: Debug Railway connectivity
        run: |
          set -euo pipefail
          curl -I --http1.1 --connect-timeout 10 --max-time 30 https://backboard.railway.com || true

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "RAILWAY_TOKEN is not set"
            exit 1
          fi

          if [ -z "${RAILWAY_SERVICE_ID:-}" ]; then
            echo "RAILWAY_SERVICE_ID is not set"
            exit 1
          fi

          latest_deployment_id() {
            local output
            if ! output="$(railway deployment list --service="$RAILWAY_SERVICE_ID" --limit 10 --json 2>/tmp/railway-deployment-list.err)"; then
              echo "Unable to list Railway deployments:" >&2
              cat /tmp/railway-deployment-list.err >&2 || true
              return 1
            fi
            python3 -c 'import json,sys; raw=sys.stdin.read().strip(); data=json.loads(raw) if raw else []; print(data[0]["id"] if data else "")' <<<"$output"
          }

          deployment_status() {
            target_id="$1"
            local output
            if ! output="$(railway deployment list --service="$RAILWAY_SERVICE_ID" --limit 20 --json 2>/tmp/railway-deployment-list.err)"; then
              echo "Unable to list Railway deployments:" >&2
              cat /tmp/railway-deployment-list.err >&2 || true
              return 1
            fi
            python3 -c 'import json,sys; needle=sys.argv[1]; raw=sys.stdin.read().strip(); data=json.loads(raw) if raw else []; print(next((item["status"] for item in data if item["id"] == needle), ""))' "$target_id" <<<"$output"
          }

          baseline_deployment_id="$(latest_deployment_id)"
          echo "Latest deployment before upload: ${baseline_deployment_id:-<none>}"

          for attempt in 1 2 3 4 5; do
            echo "Railway deploy attempt ${attempt}/5"

            set +e
            railway up --service="$RAILWAY_SERVICE_ID" --detach --ci --verbose
            up_exit_code=$?
            set -e

            echo "railway up exit code: $up_exit_code"

            new_deployment_id=""
            for poll in $(seq 1 18); do
              current_deployment_id="$(latest_deployment_id)"
              if [ -n "$current_deployment_id" ] && [ "$current_deployment_id" != "$baseline_deployment_id" ]; then
                new_deployment_id="$current_deployment_id"
                break
              fi
              echo "Waiting for Railway to register a new deployment... (${poll}/18)"
              sleep 10
            done

            if [ -z "$new_deployment_id" ]; then
              echo "No new deployment appeared after attempt ${attempt}."
            else
              echo "Tracking deployment ${new_deployment_id}"

              for poll in $(seq 1 30); do
                status="$(deployment_status "$new_deployment_id")"
                echo "Deployment ${new_deployment_id} status: ${status:-unknown} (${poll}/30)"

                case "$status" in
                  SUCCESS)
                    exit 0
                    ;;
                  FAILED|CRASHED|REMOVED)
                    break
                    ;;
                esac

                sleep 10
              done

              baseline_deployment_id="$new_deployment_id"
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep_seconds=$((attempt * 20))
              echo "Railway deploy did not complete successfully, retrying in ${sleep_seconds}s..."
              sleep "$sleep_seconds"
            fi
          done

          echo "Railway deploy failed after 5 attempts"
          exit 1
